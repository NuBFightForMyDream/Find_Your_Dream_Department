<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลภาควิชา | CUEE Camp</title>
    <link rel="icon" type="image/png" href="/assets/img/gear-icon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* ==================== 1. Theme Variables ==================== */
        :root {
            --maya-green: #5d866c;
            --maya-brown-dark: #624646;
            --maya-brown-red: #914F1E;
            --maya-sand: #DEAC80;
            --maya-cream: #F7DCB9;
            --maya-sage: #B5C18E;
        }

        body {
            background-color: var(--maya-cream);
            color: var(--maya-brown-dark);
            font-family: 'Prompt', sans-serif;
            background-image: radial-gradient(var(--maya-sand) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* ==================== 2. Navbar ==================== */
        .theme-navbar {
            background-color: var(--maya-green) !important;
            border-bottom: 5px solid var(--maya-sage);
            box-shadow: 0 4px 15px rgba(93, 134, 108, 0.4);
            border-radius: 0 0 20px 20px;
        }
        .navbar-brand { color: #fff !important; font-weight: 700; }
        .nav-link { color: #fff !important; }
        .nav-link.active { color: var(--maya-brown-dark) !important; background-color: var(--maya-cream); border-radius: 15px; font-weight: 700; }

        /* ==================== 3. Department Buttons (Left Side) ==================== */
        .dept-btn {
            text-align: left;
            background-color: rgba(255, 255, 255, 0.6);
            border: 2px solid var(--maya-green);
            color: var(--maya-green);
            margin-bottom: 8px;
            border-radius: 12px;
            padding: 12px 20px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .dept-btn:hover {
            background-color: var(--maya-sage);
            color: var(--maya-brown-dark);
            transform: translateX(5px); /* ขยับไปทางขวานิดนึงตอนชี้ */
        }

        /* สถานะปุ่มที่ถูกกดอยู่ */
        .dept-btn.active {
            background-color: var(--maya-green);
            color: white;
            box-shadow: 0 4px 10px rgba(93, 134, 108, 0.4);
            font-weight: 700;
        }

        /* ==================== 4. Display Card (Right Side) ==================== */
        .info-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(98, 70, 70, 0.15);
            padding: 30px;
            min-height: 500px; /* ความสูงขั้นต่ำ */
            position: relative;
        }

        .dept-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid var(--maya-sand);
            margin-bottom: 20px;
        }

        .dept-title {
            color: var(--maya-brown-red);
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Animation ตอนเปลี่ยนเนื้อหา */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar ปรับแต่งให้สวยงามในกล่องปุ่ม (กรณีปุ่มเยอะ) */
        .scrollable-menu {
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        /* Custom Scrollbar */
        .scrollable-menu::-webkit-scrollbar { width: 6px; }
        .scrollable-menu::-webkit-scrollbar-track { background: transparent; }
        .scrollable-menu::-webkit-scrollbar-thumb { background-color: var(--maya-sand); border-radius: 10px; }

    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg theme-navbar sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand" href="homepage.html">⚡ CUEE Camp 3rd</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="homepage.html">หน้าหลัก</a></li>
                    <li class="nav-item"><a class="nav-link" href="selection_system.html">ระบบการเลือกสาขา</a></li>
                    <li class="nav-item"><a class="nav-link active" href="department_info.html">ข้อมูลภาควิชา</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row">
            <div class="col-12 text-center mb-4">
                <h2 class="dept-title" style="color: var(--maya-brown-dark);">🌟 สำรวจ 13 ภาควิชา</h2>
                <p class="text-muted">คลิกที่รายชื่อภาควิชาด้านซ้าย เพื่อดูรายละเอียดเจาะลึก</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4 col-md-5">
                <div class="scrollable-menu" id="buttons-container">
                    </div>
            </div>

            <div class="col-lg-8 col-md-7">
                <div class="info-card" id="display-area">
                    <div class="d-flex flex-column justify-content-center align-items-center h-100 text-center text-muted">
                        <i class="bi bi-compass" style="font-size: 5rem; color: var(--maya-sand);"></i>
                        <h3 class="mt-3">ยังไม่ได้เลือกภาควิชา</h3>
                        <p>เลือกภาควิชาที่สนใจจากเมนูด้านซ้ายได้เลย!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==================== 1. ฐานข้อมูลภาควิชา (แก้ไขตรงนี้!) ====================
        const departments = [
            { 
                id: 1, 
                name: "วิศวกรรมโยธา (Civil)", 
                icon: "🏗️", 
                image: "https://placehold.co/800x400/5d866c/FFF?text=Civil+Engineering", 
                desc: "เรียนเกี่ยวกับการก่อสร้างอาคาร ถนน เขื่อน และระบบสาธารณูปโภคต่างๆ เน้นโครงสร้างและความแข็งแรง",
                jobs: "วิศวกรโครงสร้าง, ผู้ควบคุมงานก่อสร้าง, วิศวกรสำรวจ"
            },
            { 
                id: 2, 
                name: "วิศวกรรมไฟฟ้า (Electrical)", 
                icon: "⚡", 
                image: "https://placehold.co/800x400/914F1E/FFF?text=Electrical+Engineering", 
                desc: "ศึกษาเกี่ยวกับระบบไฟฟ้ากำลัง การส่งจ่ายพลังงาน อิเล็กทรอนิกส์ และระบบสื่อสาร 5G/6G",
                jobs: "วิศวกรไฟฟ้ากำลัง, วิศวกรระบบสื่อสาร, ออกแบบวงจร"
            },
            { 
                id: 3, 
                name: "วิศวกรรมเครื่องกล (Mechanical)", 
                icon: "⚙️", 
                image: "https://placehold.co/800x400/624646/FFF?text=Mechanical+Engineering", 
                desc: "เกี่ยวข้องกับเครื่องจักรกล พลังงานความร้อน ระบบทำความเย็น และการออกแบบชิ้นส่วนยานยนต์",
                jobs: "วิศวกรโรงงาน, ออกแบบเครื่องจักร, วิศวกรระบบปรับอากาศ"
            },
            { 
                id: 4, 
                name: "วิศวกรรมยานยนต์ (Automotive)", 
                icon: "🚗", 
                image: "https://placehold.co/800x400/B5C18E/333?text=Automotive", 
                desc: "เจาะลึกเรื่องยานยนต์โดยเฉพาะ ทั้งเครื่องยนต์สันดาปและรถยนต์ไฟฟ้า (EV) ระบบช่วงล่าง",
                jobs: "วิศวกรพัฒนายานยนต์, R&D รถยนต์ไฟฟ้า"
            },
            { 
                id: 5, 
                name: "วิศวกรรมอุตสาหการ (Industrial)", 
                icon: "🏭", 
                image: "https://placehold.co/800x400/DEAC80/333?text=Industrial+Engineering", 
                desc: "เน้นการบริหารจัดการระบบการผลิต การลดต้นทุน การจัดการโลจิสติกส์ และการเพิ่มประสิทธิภาพงาน",
                jobs: "วิศวกรวางแผนการผลิต, Supply Chain Manager"
            },
            { id: 6, name: "วิศวกรรมเคมี (Chemical)", icon: "🧪", image: "https://placehold.co/800x400/5d866c/FFF?text=Chemical", desc: "เปลี่ยนวัตถุดิบทางเคมีให้เป็นผลิตภัณฑ์ที่มีมูลค่า อุตสาหกรรมปิโตรเคมี ยา และอาหาร", jobs: "วิศวกรกระบวนการผลิต, อุตสาหกรรมน้ำมัน" },
            { id: 7, name: "วิศวกรรมทรัพยากรธรณี (Geo)", icon: "⛰️", image: "https://placehold.co/800x400/624646/FFF?text=Geo-Resources", desc: "การสำรวจและผลิตทรัพยากรธรรมชาติ แร่ธาตุ น้ำมัน และอุโมงค์ใต้ดิน", jobs: "วิศวกรเหมืองแร่, วิศวกรขุดเจาะน้ำมัน" },
            { id: 8, name: "วิศวกรรมสิ่งแวดล้อม (Envi)", icon: "🌿", image: "https://placehold.co/800x400/914F1E/FFF?text=Environmental", desc: "การจัดการมลพิษ ระบบบำบัดน้ำเสีย การจัดการขยะ และการพัฒนาที่ยั่งยืน", jobs: "วิศวกรสิ่งแวดล้อม, ที่ปรึกษาด้าน EIA" },
            { id: 9, name: "วิศวกรรมสำรวจ (Survey)", icon: "🗺️", image: "https://placehold.co/800x400/DEAC80/333?text=Survey", desc: "การรังวัด แผนที่ ภาพถ่ายดาวเทียม และระบบสารสนเทศภูมิศาสตร์ (GIS)", jobs: "วิศวกรสำรวจ, ผู้เชี่ยวชาญ GIS" },
            { id: 10, name: "วิศวกรรมโลหการ (Metallurgical)", icon: "🔩", image: "https://placehold.co/800x400/B5C18E/333?text=Metallurgical", desc: "ศึกษาวัสดุโลหะ การปรับปรุงคุณสมบัติวัสดุ และการป้องกันการกัดกร่อน", jobs: "วิศวกรวัสดุ, ตรวจสอบความเสียหายโลหะ" },
            { id: 11, name: "วิศวกรรมคอมพิวเตอร์ (Computer)", icon: "💻", image: "https://placehold.co/800x400/5d866c/FFF?text=Computer", desc: "Hardware, Software, AI, Cybersecurity และระบบเครือข่าย", jobs: "Software Engineer, Data Scientist, System Admin" },
            { id: 12, name: "วิศวกรรมนิวเคลียร์ (Nuclear)", icon: "☢️", image: "https://placehold.co/800x400/914F1E/FFF?text=Nuclear", desc: "การใช้ประโยชน์จากพลังงานนิวเคลียร์ รังสีทางการแพทย์ และความปลอดภัยทางรังสี", jobs: "นักฟิสิกส์รังสี, วิศวกรโรงไฟฟ้านิวเคลียร์" },
            { id: 13, name: "วิศวกรรมแหล่งน้ำ (Water)", icon: "💧", image: "https://placehold.co/800x400/624646/FFF?text=Water+Resources", desc: "การบริหารจัดการน้ำ เขื่อน ระบบชลประทาน และการป้องกันน้ำท่วม", jobs: "วิศวกรชลประทาน, กรมทรัพยากรน้ำ" },
        ];

        // ==================== 2. สร้างปุ่มอัตโนมัติ ====================
        const container = document.getElementById('buttons-container');
        const displayArea = document.getElementById('display-area');

        departments.forEach(dept => {
            const btn = document.createElement('button');
            btn.className = 'btn dept-btn w-100'; // ใช้ Bootstrap + Custom Class
            btn.innerHTML = `<span class="me-2 fs-5">${dept.icon}</span> ${dept.name}`;
            
            // เมื่อกดปุ่มนี้
            btn.onclick = function() {
                // 1. เอา active ออกจากปุ่มอื่นทั้งหมด
                document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
                // 2. ใส่ active ให้ปุ่มที่กด
                btn.classList.add('active');
                // 3. แสดงข้อมูล
                renderContent(dept);
            };

            container.appendChild(btn);
        });

        // ==================== 3. ฟังก์ชันแสดงผล (Template) ====================
        function renderContent(data) {
            displayArea.innerHTML = `
                <div class="fade-in">
                    <img src="${data.image}" class="dept-image shadow-sm" alt="${data.name}">
                    
                    <h2 class="dept-title mb-3">
                        <span class="me-2">${data.icon}</span> ${data.name}
                    </h2>
                    
                    <div class="p-3 bg-light rounded mb-3 border">
                        <h5 class="fw-bold text-success">📖 เรียนเกี่ยวกับอะไร?</h5>
                        <p class="mb-0">${data.desc}</p>
                    </div>

                    <div class="p-3 rounded mb-4" style="background-color: var(--maya-cream);">
                        <h5 class="fw-bold text-dark">💼 จบไปทำงานอะไร?</h5>
                        <p class="mb-0 text-muted fw-bold">${data.jobs}</p>
                    </div>

                    <div class="text-end">
                        <a href="#" class="btn btn-outline-danger rounded-pill px-4">ดูหลักสูตรเต็มๆ <i class="bi bi-arrow-right"></i></a>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
